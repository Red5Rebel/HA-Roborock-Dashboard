      # =============================================================
      #  CONSUMABLES — Brush/filter/sensor life progress bars
      # =============================================================
      - type: custom:stack-in-card
        mode: vertical
        layout_options:
          columns: 4
        card_mod:
          style: |
            ha-card {
              border-radius: 24px;
              border: 1px solid var(--divider-color);
              box-shadow: var(--ha-card-box-shadow, 0px 2px 4px rgba(0,0,0,0.1)) !important;
            }
        cards:
          - type: custom:button-card
            entity: vacuum.YOUR_VACUUM
            show_name: false
            show_icon: false
            show_state: false
            tap_action:
              action: none
            styles:
              card:
                - padding: 20px
                - background: none
                - border: none
                - box-shadow: none
              grid:
                - grid-template-areas: "\"content\""
                - grid-template-columns: 1fr
              custom_fields:
                content:
                  - width: 100%
            custom_fields:
              content: |
                [[[
                  const consumables = [
                    { name: 'Main Brush', entity: 'sensor.YOUR_VACUUM_main_brush_time_left', maxHrs: 300, icon: 'mdi:brush' },
                    { name: 'Side Brush', entity: 'sensor.YOUR_VACUUM_side_brush_time_left', maxHrs: 200, icon: 'mdi:pinwheel-outline' },
                    { name: 'Filter', entity: 'sensor.YOUR_VACUUM_filter_time_left', maxHrs: 150, icon: 'mdi:air-filter' },
                    { name: 'Sensors', entity: 'sensor.YOUR_VACUUM_sensor_time_left', maxHrs: 30, icon: 'mdi:eye-outline' },
                    { name: 'Dock Strainer', entity: 'sensor.YOUR_VACUUM_dock_strainer_time_left', maxHrs: 150, icon: 'mdi:filter-variant' }
                  ];

                  let rows = '';
                  consumables.forEach(c => {
                    const hrs = parseFloat(states[c.entity].state);
                    const pct = Math.min(100, Math.max(0, (hrs / c.maxHrs) * 100));
                    const color = pct > 50 ? '#4CAF50' : pct > 20 ? '#FF9800' : '#F44336';
                    const hrsStr = hrs >= 1 ? Math.round(hrs) + 'h' : Math.round(hrs * 60) + 'm';

                    rows += `
                      <div style="margin-bottom: 14px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                          <div style="display: flex; align-items: center; gap: 8px;">
                            <ha-icon icon="${c.icon}" style="width: 18px; height: 18px; color: ${color};"></ha-icon>
                            <span style="font-size: 13px; color: var(--primary-text-color);">${c.name}</span>
                          </div>
                          <span style="font-size: 13px; color: var(--secondary-text-color);">${hrsStr} left</span>
                        </div>
                        <div style="background: rgba(0,0,0,0.3); border-radius: 4px; height: 6px; overflow: hidden;">
                          <div style="background: ${color}; height: 100%; width: ${pct}%; border-radius: 4px;"></div>
                        </div>
                      </div>
                    `;
                  });

                  return `
                    <div>
                      <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px;">
                        <div style="width: 20px; height: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                          <ha-icon icon="mdi:wrench-clock" style="color: var(--secondary-text-color);"></ha-icon>
                        </div>
                           <div style="font-size: 12px; color: var(--secondary-text-color); text-transform: uppercase;">Consumables</div>
                        </div>
                      ${rows}
                    </div>
                  `;
                ]]]

      # =============================================================
      #  DOCK STATUS — Tanks, mop/water box, drying, errors
      #  NOTE: Drying time sensor returns SECONDS. If yours uses
      #        minutes, remove the "/ 60" conversion below.
      # =============================================================
      - type: custom:stack-in-card
        mode: vertical
        layout_options:
          columns: 4
        card_mod:
          style: |
            ha-card {
              border-radius: 24px;
              border: 1px solid var(--divider-color);
              box-shadow: var(--ha-card-box-shadow, 0px 2px 4px rgba(0,0,0,0.1)) !important;
            }
        cards:
          - type: custom:button-card
            entity: vacuum.YOUR_VACUUM
            show_name: false
            show_icon: false
            show_state: false
            tap_action:
              action: none
            styles:
              card:
                - padding: 20px
                - background: none
                - border: none
                - box-shadow: none
              grid:
                - grid-template-areas: "\"content\""
                - grid-template-columns: 1fr
              custom_fields:
                content:
                  - width: 100%
            custom_fields:
              content: |
                [[[
                  const cleanTank = states['binary_sensor.YOUR_VACUUM_dock_clean_water_box'].state;
                  const dirtyTank = states['binary_sensor.YOUR_VACUUM_dock_dirty_water_box'].state;
                  const mopDrying = states['binary_sensor.YOUR_VACUUM_dock_mop_drying'].state;
                  const dryingTime = states['sensor.YOUR_VACUUM_dock_mop_drying_remaining_time'].state;
                  const dockError = states['sensor.YOUR_VACUUM_dock_dock_error'].state;
                  const mopAttached = states['binary_sensor.YOUR_VACUUM_mop_attached'].state;
                  const waterBox = states['binary_sensor.YOUR_VACUUM_water_box_attached'].state;
                  const waterShortage = states['binary_sensor.YOUR_VACUUM_water_shortage'].state;

                  const cleanTankOk = cleanTank === 'off';
                  const dirtyTankOk = dirtyTank === 'off';
                  const hasDockError = dockError && dockError !== 'ok';
                  const isDrying = mopDrying === 'on';
                  const hasWaterShortage = waterShortage === 'on';

                  const dryingMin = Math.round(parseInt(dryingTime) / 60);
                  const dryingStr = dryingMin >= 60 ? Math.floor(dryingMin/60) + 'h ' + (dryingMin%60) + 'm' : dryingMin + 'm';

                  const statusDot = (ok, label) => `
                    <div style="display: flex; align-items: center; gap: 8px;">
                      <div style="width: 10px; height: 10px; border-radius: 50%; background: ${ok ? '#4CAF50' : '#F44336'}; flex-shrink: 0;"></div>
                      <span style="font-size: 13px; color: var(--primary-text-color);">${label}</span>
                    </div>
                  `;

                  return `
                    <div>
                      <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px;">
                        <div style="width: 20px; height: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                          <ha-icon icon="mdi:robot-vacuum" style="color: var(--secondary-text-color);"></ha-icon>
                        </div>
                        <div style="font-size: 12px; color: var(--secondary-text-color); text-transform: uppercase;">Dock Status</div>
                      </div>

                      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 12px;">
                        ${statusDot(cleanTankOk, 'Clean Tank')}
                        ${statusDot(dirtyTankOk, 'Dirty Tank')}
                        ${statusDot(mopAttached === 'on', 'Mop Attached')}
                        ${statusDot(waterBox === 'on', 'Water Box')}
                        ${statusDot(!hasWaterShortage, 'Water Level')}
                        ${statusDot(!hasDockError, 'Dock Status')}
                      </div>

                      ${isDrying ? `
                        <div style="margin-top: 12px; padding: 10px 12px; background: rgba(156,39,176,0.15); border-radius: 8px; display: flex; align-items: center; gap: 8px;">
                          <div style="width: 18px; height: 18px; overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                            <ha-icon icon="mdi:fan" style="color: #9C27B0;"></ha-icon>
                          </div>
                          <span style="font-size: 13px; color: var(--primary-text-color);">Mop Drying · ${dryingStr} remaining</span>
                        </div>
                      ` : ''}

                      ${hasDockError ? `
                        <div style="margin-top: 12px; padding: 10px 12px; background: rgba(244,67,54,0.15); border-radius: 8px; display: flex; align-items: center; gap: 8px;">
                          <div style="width: 18px; height: 18px; overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                            <ha-icon icon="mdi:alert-circle" style="color: #F44336;"></ha-icon>
                          </div>
                          <span style="font-size: 13px; color: #F44336;">${dockError.replace(/_/g, ' ').split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ')}</span>
                        </div>
                      ` : ''}
                    </div>
                  `;
                ]]]

cards: []
